name: Lint and Test Charts
"on":
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  python_version: "3.14"

jobs:
  prep_job:
    runs-on: ubuntu-latest
    # if: github.event.pull_request.draft == false
    outputs:
      has_changes: ${{ steps.changed-files.outputs.any_changed }}
      matrix: ${{ steps.result.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changed-files
        with:
          files: |
            **/*.yaml
            **/*.yml
            **/*.tpl
            .github/
          files_ignore: |
            **/.*md
            .github/CODEOWNERS
            .github/dependabot.yml
            .github/ISSUE_TEMPLATE/*
            .github/workflows/assign_issue.yml

      - run: |
          echo "Has changes: ${{ steps.changed-files.outputs.any_changed }}"
          echo "Changed files: ${{ steps.changed-files.outputs.all_changed_files }}"

          {
            echo "matrix<<EOF"
            echo '{ "include": ['
            [[ "${{ steps.changed-files.outputs.any_changed }}" == 'false' ]] && echo '{ "name": "lint" },'
            echo '{ "name": "k8s-1.35", "kindest_image": "kindest/node:v1.35.0"  },'
            echo '{ "name": "k8s-1.34", "kindest_image": "kindest/node:v1.34.3"  },'
            echo '{ "name": "k8s-1.33", "kindest_image": "kindest/node:v1.33.7"  },'
            echo '{ "name": "k8s-1.32", "kindest_image": "kindest/node:v1.32.11" },'
            echo '{ "name": "k8s-1.31", "kindest_image": "kindest/node:v1.31.14" }'
            echo '] }'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: result

  test:
    runs-on: ubuntu-latest
    needs: prep_job
    if: ${{ needs.prep_job.outputs.has_changes == 'true' && github.event.pull_request.draft == false }}
    env:
      # See https://github.com/kubernetes-sigs/kind/releases
      # Check and update the image versions in the prep_job as well when updating this version.
      kind_version: v0.31.0
      istio_version: 1.27.1
      k8s_sigs_gateway_version: v1.3.0
    strategy:
      matrix: ${{ fromJson(needs.prep_job.outputs.matrix) }}
      fail-fast: false
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.python_version }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Lint charts
        run: ct lint --config .github/workflows/conf/ct-lint.yml

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: .github/workflows/conf/kind.yml
          version: ${{ env.kind_version }}
          node_image: ${{ matrix.kindest_image }}

      - name: Create chart preconditions
        run: .github/workflows/scripts/chart-test-prep.sh ${{ env.istio_version }} ${{ env.k8s_sigs_gateway_version }}

      - name: Chart installation tests
        run: .github/workflows/scripts/chart-test.sh

      - name: Debug information on failure
        run: |
          echo "=== chart-testing failures ==="; grep -C 3 'INSTALLATION FAILED' .tmp/ct-test.log
          echo "=== Nodes Info ==="; kubectl describe nodes
          echo "=== API Versions ==="; kubectl api-versions
          echo "=== CRDs ==="; kubectl get crd
        if: failure()

  lint:
    runs-on: ubuntu-latest
    needs: prep_job
    if: ${{ needs.prep_job.outputs.has_changes == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.python_version }}

      - name: Run checkov on each test case permutation
        run: .github/workflows/scripts/checkov-chart-linting.sh

  skip:
    runs-on: ubuntu-latest
    needs: prep_job
    if: ${{ needs.prep_job.outputs.has_changes == 'false' }}
    strategy:
      matrix: ${{ fromJson(needs.prep_job.outputs.matrix) }}
    name: ${{ matrix.name }}
    steps:
      - run: |
          echo "Skip ${{ matrix.name }} for this pull request because no relevant files have been changed."
          echo "This is needed to not block the pull request as these are configured as required status check."
